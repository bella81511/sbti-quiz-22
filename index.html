<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛龙22周年 · SLTI人格测评</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(to top right, #00E6DC 0%, #056E50 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(5, 110, 80, 0.25);
            max-width: 680px;
            width: 100%;
            padding: 40px 40px 48px;
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, #00E6DC, #056E50);
        }
        .event-logo {
            text-align: center;
            margin-bottom: 24px;
            padding: 16px;
        }
        .event-logo img {
            max-width: 320px;
            max-height: 120px;
            width: auto;
            height: auto;
            object-fit: contain;
        }
        .start-screen { text-align: center; padding: 10px 0 20px; }
        .start-screen h1 {
            font-size: 32px;
            color: #1E293B;
            margin-bottom: 12px;
            font-weight: 700;
        }
        .start-screen .subtitle {
            font-size: 18px;
            color: #056E50;
            margin-bottom: 28px;
            font-weight: 500;
        }
        .start-screen .desc {
            color: #475569;
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 36px;
            padding: 0 20px;
        }
        .start-btn {
            background: linear-gradient(135deg, #00E6DC, #056E50);
            color: #fff;
            border: none;
            padding: 16px 56px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 230, 220, 0.4);
        }
        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 230, 220, 0.5);
        }
        .quiz-area { display: none; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #E2E8F0;
            border-radius: 4px;
            margin-bottom: 32px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00E6DC, #056E50);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .question-counter {
            text-align: center;
            color: #94A3B8;
            font-size: 14px;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .question-text {
            font-size: 20px;
            color: #1E293B;
            font-weight: 600;
            margin-bottom: 32px;
            line-height: 1.6;
            padding: 0 8px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            background: #F0FDF9;
            border: 2px solid #E2E8F0;
            border-radius: 16px;
            padding: 18px 24px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 15px;
            color: #1E293B;
            line-height: 1.5;
            text-align: left;
            position: relative;
            overflow: hidden;
        }
        .option:hover {
            border-color: #00E6DC;
            background: #E6FFFB;
            transform: translateX(4px);
        }
        .option.selected {
            border-color: #00E6DC;
            background: linear-gradient(135deg, rgba(0,230,220,0.08), rgba(5,110,80,0.08));
            color: #056E50;
            font-weight: 500;
        }
        .nav-btns {
            display: flex;
            justify-content: space-between;
            margin-top: 32px;
            gap: 16px;
        }
        .nav-btn {
            padding: 12px 28px;
            border-radius: 24px;
            border: 2px solid #E2E8F0;
            background: #fff;
            color: #475569;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .nav-btn:hover:not(:disabled) {
            border-color: #00E6DC;
            color: #056E50;
        }
        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .nav-btn.next {
            background: linear-gradient(135deg, #00E6DC, #056E50);
            color: #fff;
            border: none;
            box-shadow: 0 4px 12px rgba(0, 230, 220, 0.3);
        }
        .loading-screen {
            display: none;
            text-align: center;
            padding: 60px 20px;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #E2E8F0;
            border-top-color: #00E6DC;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .result-screen { display: none; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-header { text-align: center; margin-bottom: 20px; }
        .result-badge {
            display: inline-block;
            background: linear-gradient(135deg, #00E6DC, #056E50);
            color: #fff;
            padding: 6px 16px;
            border-radius: 16px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .character-area {
            text-align: center;
            margin: 16px 0 24px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(0,230,220,0.06), rgba(5,110,80,0.06));
            border-radius: 20px;
        }
        .character-img {
            width: 220px;
            height: 220px;
            margin: 0 auto;
            object-fit: contain;
            border-radius: 16px;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.1));
        }
        .result-title {
            font-size: 28px;
            color: #1E293B;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .result-code {
            font-size: 14px;
            color: #056E50;
            font-weight: 600;
            letter-spacing: 2px;
        }
        .result-quote {
            background: linear-gradient(135deg, #F0FDF9, #E6FFFB);
            border-left: 4px solid #00E6DC;
            padding: 20px 24px;
            border-radius: 0 12px 12px 0;
            margin: 24px 0;
            font-size: 16px;
            color: #475569;
            line-height: 1.7;
            font-style: italic;
        }
        .result-section { margin: 24px 0; }
        .result-section h3 {
            font-size: 16px;
            color: #1E293B;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .result-section h3::before {
            content: '';
            width: 4px;
            height: 18px;
            background: linear-gradient(180deg, #00E6DC, #056E50);
            border-radius: 2px;
        }
        .result-section p, .result-section li {
            color: #475569;
            font-size: 14px;
            line-height: 1.8;
        }
        .result-section ul { list-style: none; padding-left: 0; }
        .result-section li {
            padding: 6px 0;
            padding-left: 20px;
            position: relative;
        }
        .result-section li::before {
            content: '▸';
            position: absolute;
            left: 0;
            color: #00E6DC;
        }
        .partner-tag {
            display: inline-block;
            background: #E6FFFB;
            color: #056E50;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 13px;
            margin: 2px;
            font-weight: 500;
        }
        .footnote {
            background: linear-gradient(135deg, rgba(0,230,220,0.05), rgba(5,110,80,0.05));
            border: 1px dashed rgba(0,230,220,0.3);
            border-radius: 12px;
            padding: 20px;
            margin-top: 28px;
            font-size: 14px;
            color: #475569;
            line-height: 1.8;
        }
        .footnote strong { color: #056E50; }
        .share-section {
            margin: 24px 0;
            text-align: center;
        }
        .share-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: linear-gradient(135deg, #00E6DC, #056E50);
            color: #fff;
            border: none;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 230, 220, 0.4);
        }
        .share-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 230, 220, 0.5);
        }
        .share-btn.copied {
            background: linear-gradient(135deg, #10B981, #059669);
        }
        .share-hint {
            margin-top: 12px;
            font-size: 13px;
            color: #94A3B8;
        }
        .restart-btn {
            display: block;
            width: 100%;
            margin-top: 24px;
            padding: 16px;
            background: linear-gradient(135deg, #00E6DC, #056E50);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 230, 220, 0.4);
        }
        .score-bars { margin: 20px 0; }
        .score-bar-item {
            display: flex;
            align-items: center;
            margin: 10px 0;
            font-size: 13px;
        }
        .score-bar-label {
            width: 80px;
            color: #475569;
            font-weight: 500;
        }
        .score-bar-track {
            flex: 1;
            height: 8px;
            background: #E2E8F0;
            border-radius: 4px;
            margin: 0 12px;
            overflow: hidden;
        }
        .score-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s ease;
        }
        .score-bar-value {
            width: 30px;
            text-align: right;
            color: #056E50;
            font-weight: 600;
        }
        @media (max-width: 480px) {
            .container { padding: 32px 20px 40px; border-radius: 20px; }
            .start-screen h1 { font-size: 26px; }
            .question-text { font-size: 18px; }
            .option { padding: 16px 18px; font-size: 14px; }
            .character-img { width: 180px; height: 180px; }
            .event-logo img { max-width: 280px; max-height: 100px; }
        }
    </style>
</head>

                desc: "恭喜你，你测出了全公司最稀缺的502型人格。你能记得同事随口提过的小事——谁不吃香菜、谁最近在赶deadline、谁的孩子刚上幼儿园。跨部门会议卡壳的时候，你是第一个破冰让讨论继续的人。团队气氛低迷，你常常用'要不我们先一起吃个饭？'重新把局面打开。",
                teamRole: ["组织之间的连接器，让信息不是断点，而是流动", "冲突场景的缓冲带，让对立不会变成对抗", "但也可能在过度维系关系时，让问题被暂时'变软'，而不是被解决"],
                light: "是让大家即使不同，也愿意继续合作",
                partners: ["拿捏者", "兜底王"],
                footnote: "真正的连接，不是没有冲突，而是冲突之后，关系更加坚韧。粘合剂的价值，不是让大家都变得相同，而是让不同的人，可以一起把事情做成。"
            }
        };

        let currentQuestion = 0;
        let answers = new Array(questions.length).fill(null);
        let scores = { pioneer: 0, ctrl: 0, builder: 0, doer: 0, idea: 0, last: 0, cpu: 0, link: 0 };

        function startQuiz() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('quizArea').style.display = 'block';
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('questionCounter').textContent = '第 ' + (currentQuestion + 1) + ' / ' + questions.length + ' 题';
            document.getElementById('questionText').textContent = q.text;
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            let optionsHtml = '';
            for (let i = 0; i < q.options.length; i++) {
                const selected = answers[currentQuestion] === i ? 'selected' : '';
                optionsHtml += '<button class="option ' + selected + '" onclick="selectOption(' + i + ')">' + q.options[i].text + '</button>';
            }
            document.getElementById('options').innerHTML = optionsHtml;
            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            document.getElementById('nextBtn').textContent = currentQuestion === questions.length - 1 ? '查看结果' : '下一题';
        }

        function selectOption(idx) {
            answers[currentQuestion] = idx;
            const opts = document.querySelectorAll('.option');
            for (let i = 0; i < opts.length; i++) {
                opts[i].classList.toggle('selected', i === idx);
            }
        }

        function nextQuestion() {
            if (answers[currentQuestion] === null) {
                alert('请先选择一个答案');
                return;
            }
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showLoading();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        function showLoading() {
            document.getElementById('quizArea').style.display = 'none';
            document.getElementById('loadingScreen').style.display = 'block';
            setTimeout(function() { calculateResult(); }, 2000);
        }

        function calculateResult() {
            scores = { pioneer: 0, ctrl: 0, builder: 0, doer: 0, idea: 0, last: 0, cpu: 0, link: 0 };
            for (let i = 0; i < answers.length; i++) {
                if (answers[i] !== null) {
                    const opt = questions[i].options[answers[i]];
                    for (let key in opt.scores) {
                        scores[key] += opt.scores[key];
                    }
                }
            }
            const sorted = [];
            for (let key in scores) {
                sorted.push([key, scores[key]]);
            }
            sorted.sort(function(a, b) { return b[1] - a[1]; });
            showResult(sorted[0][0], sorted[1][0], sorted);
        }

        function copyShareText() {
            const primary = document.querySelector('.result-title').getAttribute('data-personality');
            const text = shareTexts[primary];
            navigator.clipboard.writeText(text).then(function() {
                const btn = document.querySelector('.share-btn');
                btn.textContent = '✓ 已复制';
                btn.classList.add('copied');
                setTimeout(function() {
                    btn.textContent = '📋 复制分享文案';
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(function() {
                alert('复制失败，请手动复制');
            });
        }

        function showResult(primary, secondary, allScores) {
            document.getElementById('loadingScreen').style.display = 'none';
            const resultScreen = document.getElementById('resultScreen');
            resultScreen.style.display = 'block';
            const p = personalities[primary];
            const s = personalities[secondary];
            const maxScore = Math.max.apply(null, allScores.map(function(x) { return x[1]; }));
            let scoreBars = '';
            for (let i = 0; i < allScores.length; i++) {
                const key = allScores[i][0];
                const val = allScores[i][1];
                const pct = (val / maxScore) * 100;
                const isPrimary = key === primary;
                const color = isPrimary ? p.color : '#e0e0e0';
                scoreBars += '<div class="score-bar-item"><span class="score-bar-label">' + personalities[key].name + '</span><div class="score-bar-track"><div class="score-bar-fill" style="width: ' + pct + '%; background: ' + color + ';"></div></div><span class="score-bar-value">' + val + '</span></div>';
            }

            const characterImg = characterImages[primary];
            const characterHtml = '<div class="character-area"><img src="' + characterImg + '" alt="' + p.name + '" class="character-img" onerror="this.style.display='none'"></div>';

            resultScreen.innerHTML = '<div class="result-header"><div class="result-badge">赛龙22周年 · SLTI</div><div class="result-title" data-personality="' + primary + '">' + p.name + '</div><div class="result-code">' + p.code + '</div></div>' + characterHtml + '<div class="result-quote">"' + p.quote + '"</div><div class="result-section"><h3>你是这样的</h3><p>' + p.desc + '</p></div><div class="result-section"><h3>团队里的你</h3><ul>' + p.teamRole.map(function(r) { return '<li>' + r + '</li>'; }).join('') + '</ul></div><div class="result-section"><h3>你的光</h3><p style="color: ' + p.color + '; font-weight: 600;">' + p.light + '</p></div><div class="result-section"><h3>最佳拍档</h3><p>' + p.partners.map(function(partner) { return '<span class="partner-tag">' + partner + '</span>'; }).join('') + '</p><p style="margin-top: 10px; font-size: 13px; color: #888;">你的副人格是 <strong style="color: ' + s.color + ';">' + s.name + '</strong>（' + s.code + '），这意味着你除了' + p.name + '的核心特质外，还具备' + s.name + '的' + s.light.split('，')[0] + '能力。</p></div><div class="result-section"><h3>人格能量分布</h3><div class="score-bars">' + scoreBars + '</div></div><div class="share-section"><button class="share-btn" onclick="copyShareText()">📋 复制分享文案</button><p class="share-hint">复制后可直接粘贴到朋友圈/小红书/微博</p></div><div class="footnote"><strong>' + p.name + '注脚：</strong>' + p.footnote + '<br><br>在赛龙，我们从不要求每个人都一样。<br>有人负责点火，有人擅长收尾，有人负责把火种变成燎原之势。<br><strong>正因为我们不一样，所以我们在一起更好。</strong></div><button class="restart-btn" onclick="restartQuiz()">再测一次</button>';
        }

        function restartQuiz() {
            currentQuestion = 0;
            answers = new Array(questions.length).fill(null);
            scores = { pioneer: 0, ctrl: 0, builder: 0, doer: 0, idea: 0, last: 0, cpu: 0, link: 0 };
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'block';
        }
    </script>
</body>
</html>
